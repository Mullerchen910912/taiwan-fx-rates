name: Update rates and deploy

on:
  schedule:
    # Taipei = UTC+8. Weekdays 09:30 / 11:30 / 14:30 / 17:30 Taipei,
    # covering bank business hours. Kept to 4 runs/day to stay polite
    # to the (ad-supported) data source.
    - cron: "30 1 * * 1-5"
    - cron: "30 3 * * 1-5"
    - cron: "30 6 * * 1-5"
    - cron: "30 9 * * 1-5"
    # One Saturday run (digital-bank rates still move on weekends).
    - cron: "0 3 * * 6"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Tests double as a tripwire: if findrate.tw changes layout,
      # the fixture-based parser tests fail loudly before we publish junk.
      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Scrape latest rates
        if: github.event_name != 'push'
        run: python -m scraper.main

      - name: Commit updated data (git-scraping history)
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || {
            git commit -m "data: rate snapshot $(date -u +'%Y-%m-%dT%H:%M')Z"
            git push
          }

      - name: Build site
        run: scripts/build_site.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
