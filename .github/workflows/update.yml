name: Update rates and deploy

on:
  schedule:
    # Taipei = UTC+8 (no DST). Every 2h from 09:00–21:00 Taipei, every day,
    # so the site's "更新匯率" button always has a snapshot < ~2h old to pull.
    # Bank cash boards only move a few times a day, so this is plenty without
    # hammering the (ad-supported) data source.
    - cron: "0 1,3,5,7,9,11,13 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Tests double as a tripwire: if findrate.tw changes layout,
      # the fixture-based parser tests fail loudly before we publish junk.
      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Scrape latest rates
        if: github.event_name != 'push'
        run: python -m scraper.main

      - name: Commit updated data (git-scraping history)
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || {
            git commit -m "data: rate snapshot $(date -u +'%Y-%m-%dT%H:%M')Z"
            git push
          }

      - name: Build site
        run: scripts/build_site.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
